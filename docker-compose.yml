version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - KF_ENV=development
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./webapp:/app/webapp
      - ./data/cache:/app/data/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/models')"]
      interval: 30s
      timeout: 10s
      retries: 3
